# =============================================================================
# Nginx reverse proxy for Affine rank dashboard + api.affine.io API mirror
# =============================================================================
#
# Why: Browsers calling https://api.affine.io directly often get 403 from an
# edge/WAF. Proxying under YOUR origin (/api/...) makes requests same-origin and
# lets nginx talk to Affine with a normal TLS Host header.
#
# Steps:
#   1. Build with a RELATIVE API base (no https://api.affine.io in the bundle):
#        VITE_API_BASE_URL=/api/v1 npm run build
#   2. Copy dist/* to the `root` path below (e.g. /var/www/affine-rank-dashboard/dist).
#   3. Adjust server_name, root, and (recommended) add TLS in a separate server block.
#   4. nginx -t && systemctl reload nginx   (or your reload command)
#
# Quick test from the server:
#   curl -sS -o /dev/null -w "%{http_code}\n" "http://127.0.0.1/api/v1/scores/latest?top=256"
#   (use -H "Host: your.server.name" if you test by IP with a server_name set)
#
# If curl from THIS machine to https://api.affine.io also returns 403, the server
# IP may be blocked upstream — nginx on the SAME machine often still gets 403
# (same egress IP). Use another host/VPN/residential egress, or ask the API
# operator to allowlist your IP.
#
# JSON body like {"message":"Forbidden"} on /api/... is usually the UPSTREAM
# response forwarded by nginx/Vite — not nginx itself denying the browser.
# =============================================================================

server {
    listen 80;
    # listen 443 ssl http2;  # enable after you add ssl_certificate / ssl_certificate_key
    server_name 135.181.8.213 example.com;

    root /var/www/affine-rank-dashboard/dist;
    index index.html;

    # Dashboard (Vite/React SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Mirror https://api.affine.io/api/... under https://YOUR_HOST/api/...
    # Browser requests: GET /api/v1/scores/latest?top=256
    # Upstream:        GET https://api.affine.io/api/v1/scores/latest?top=256
    location /api/ {
        proxy_pass https://api.affine.io/api/;
        proxy_ssl_server_name on;
        proxy_ssl_name api.affine.io;
        proxy_set_header Host api.affine.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_redirect off;
        # Optional: some edges care about Referer
        proxy_set_header Referer https://api.affine.io/;
    }
}
